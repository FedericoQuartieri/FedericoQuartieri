name: Generate Individual Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
  WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit calendar
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: metrics-calendar.svg

      - name: Starred topics
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: labels
          filename: metrics.plugin.topics.svg

      - name: WakaTime
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ env.WAKATIME_TOKEN }}
          filename: metrics.plugin.wakatime.svg

      - name: Languages indepth
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size
          plugin_languages_ignored: >-
            PostScript, Fortran, Makefile, Shell, TeX, Roff Manpage, Jupyter Notebook
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 120
          commits_authoring: user
          filename: metrics.plugin.languages.indepth.svg

      ##################################################
      # Habits (try charts)
      ##################################################
      - name: Habits charts (try)
        id: habits_charts
        uses: dkhokhlov/metrics@master
        continue-on-error: true
        with:
          output_action: none
          use_prebuilt_image: no
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 30
          plugin_habits_trim: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          config_timezone: Europe/Paris
          filename: metrics.plugin.habits.charts.svg

      ##################################################
      # Habits fallback (facts only) if charts failed
      ##################################################
      - name: Habits fallback (facts only)
        if: steps.habits_charts.outcome == 'failure'
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 30
          plugin_habits_trim: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          config_timezone: Europe/Paris
          filename: metrics.plugin.habits.charts.svg

      ##################################################
      # Copy renders to repo + commit
      ##################################################
      - name: Copy renders to repo
        shell: bash
        run: |
          for d in /metrics_renders ./metrics_renders ./.metrics_renders; do
            if [ -d "$d" ]; then
              for f in "$d"/metrics*.svg; do
                [ -f "$f" ] && cp -f "$f" "./$(basename "$f")"
              done
            fi
          done
          git status --porcelain

      - name: Commit and push SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update metrics SVGs"
          file_pattern: metrics*.svg
          branch: main
