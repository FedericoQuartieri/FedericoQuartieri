name: Generate Individual Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
  WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ##################################################
      # 1. Isometric commit calendar
      ##################################################
      - name: Commit calendar
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: metrics-calendar.svg

      ##################################################
      # 2. Starred topics
      ##################################################
      - name: Starred topics
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          filename: metrics.plugin.topics.svg

      ##################################################
      # 3. WakaTime
      ##################################################
      - name: WakaTime
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ env.WAKATIME_TOKEN }}
          filename: metrics.plugin.wakatime.svg

      ##################################################
      # 4. Languages activity (indepth)
      ##################################################
      - name: Languages indepth
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size
          plugin_languages_ignored: >-
            PostScript, Fortran, Makefile, Shell, TeX, Roff Manpage, Jupyter Notebook, EJS
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 120
          commits_authoring: user
          filename: metrics.plugin.languages.indepth.svg

      ##################################################
      # 5. Habits charts (custom, stable, this works)
      ##################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate habits chart (SVG)
        env:
          GH_TOKEN: ${{ env.METRICS_TOKEN }}
          GH_USER: FedericoQuartieri
          HABITS_TZ: Europe/Paris
          HABITS_SINCE_DAYS: "90"
          HABITS_MAX_COMMITS: "200"
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python - <<'PY'
          import os
          import time
          import datetime as dt
          from zoneinfo import ZoneInfo
          import requests

          TOKEN = os.environ["GH_TOKEN"]
          USER = os.environ["GH_USER"]
          TZ_NAME = os.environ.get("HABITS_TZ", "Europe/Paris")
          SINCE_DAYS = int(os.environ.get("HABITS_SINCE_DAYS", "90"))
          MAX_COMMITS = int(os.environ.get("HABITS_MAX_COMMITS", "200"))

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          tz = ZoneInfo(TZ_NAME)
          since = (dt.datetime.utcnow() - dt.timedelta(days=SINCE_DAYS)).replace(microsecond=0).isoformat() + "Z"

          session = requests.Session()
          session.headers.update(headers)

          def get_json(url, params=None, retries=4):
              backoff = 1.0
              for attempt in range(retries + 1):
                  r = session.get(url, params=params, timeout=30)
                  if r.status_code in (502, 503, 504):
                      if attempt == retries:
                          raise requests.HTTPError(f"{r.status_code} {r.reason}", response=r)
                      time.sleep(backoff)
                      backoff *= 2
                      continue
                  r.raise_for_status()
                  return r.json()
              raise RuntimeError("unreachable")

          def paged(url, params=None, max_pages=10):
              out = []
              for page in range(1, max_pages + 1):
                  p = dict(params or {})
                  p["per_page"] = 100
                  p["page"] = page
                  data = get_json(url, params=p)
                  if not data:
                      break
                  out.extend(data)
                  if len(data) < 100:
                      break
              return out

          # list repos (owned), keep it light
          repos = paged("https://api.github.com/user/repos", params={"type": "owner", "sort": "pushed"}, max_pages=2)
          repos = [r for r in repos if not r.get("fork", False)]

          times = []
          HARD_CAP = 800

          for r in repos:
              if len(times) >= HARD_CAP:
                  break
              owner = r["owner"]["login"]
              name = r["name"]
              try:
                  commits = paged(
                      f"https://api.github.com/repos/{owner}/{name}/commits",
                      params={"author": USER, "since": since},
                      max_pages=2,
                  )
              except requests.HTTPError as e:
                  code = getattr(e.response, "status_code", None)
                  print(f"Skipping {owner}/{name} due to HTTP error: {code}")
                  continue

              for c in commits:
                  cd = (c.get("commit") or {})
                  d = (cd.get("committer") or {}).get("date") or (cd.get("author") or {}).get("date")
                  if not d:
                      continue
                  try:
                      t = dt.datetime.fromisoformat(d.replace("Z", "+00:00")).astimezone(tz)
                      times.append(t)
                  except Exception:
                      pass

          times.sort(reverse=True)
          used = times[: min(MAX_COMMITS, len(times))]
          n_used = len(used)

          hour_counts = [0] * 24
          dow_counts = [0] * 7  # Sun..Sat

          def dow_sun0(t):
              return (t.weekday() + 1) % 7

          for t in used:
              hour_counts[t.hour] += 1
              dow_counts[dow_sun0(t)] += 1

          max_hour = max(hour_counts) if hour_counts else 0
          max_dow = max(dow_counts) if dow_counts else 0

          # --- SVG like metrics habits ---
          W, H = 980, 360
          pad_l, pad_r = 46, 30
          chart_w = W - pad_l - pad_r

          title_blue = "#0969da"
          text_grey = "#57606a"
          dark_green = "#116329"
          light_green = "#7ee2a8"

          def esc(s):
              return (s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")
                       .replace('"', "&quot;").replace("'", "&#39;"))

          svg = []
          svg.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}" viewBox="0 0 {W} {H}">')
          svg.append(f'<text x="{pad_l}" y="34" font-family="Arial, sans-serif" font-size="22" fill="{title_blue}">Recent coding habits</text>')
          svg.append(f'<text x="{pad_l+250}" y="34" font-family="Arial, sans-serif" font-size="14" fill="{text_grey}">(computed from last {n_used} commits)</text>')

          svg.append(f'<text x="{W/2}" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="{title_blue}">Commit activity per hour of day</text>')
          svg.append(f'<text x="{W/2}" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="{title_blue}">Commit activity per day of week</text>')

          # hour chart
          base_y1, max_h1 = 150, 74
          slot = chart_w / 24.0
          bar_w = 14
          dot_r = 6
          dot_threshold = 2

          for hr in range(24):
              c = hour_counts[hr]
              cx = pad_l + slot * hr + slot / 2
              if c > 0:
                  if c <= dot_threshold or max_hour == 0:
                      svg.append(f'<circle cx="{cx:.2f}" cy="{base_y1}" r="{dot_r}" fill="{light_green}"/>')
                      svg.append(f'<text x="{cx:.2f}" y="{base_y1-14}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{c}</text>')
                  else:
                      h = int(round(max_h1 * (c / max_hour))) if max_hour else 6
                      x = cx - bar_w / 2
                      y = base_y1 - h
                      svg.append(f'<rect x="{x:.2f}" y="{y:.2f}" width="{bar_w}" height="{h}" rx="{bar_w/2}" fill="{dark_green}"/>')
                      svg.append(f'<text x="{cx:.2f}" y="{y-8:.2f}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{c}</text>')
              svg.append(f'<text x="{cx:.2f}" y="{base_y1+30}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{hr:02d}</text>')

          # day chart
          base_y2, max_h2 = 300, 74
          days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]
          slot2 = chart_w / 7.0
          bar_w2 = 18
          dot_r2 = 7

          for i, dname in enumerate(days):
              c = dow_counts[i]
              cx = pad_l + slot2 * i + slot2 / 2
              if c > 0:
                  if c <= dot_threshold or max_dow == 0:
                      svg.append(f'<circle cx="{cx:.2f}" cy="{base_y2}" r="{dot_r2}" fill="{light_green}"/>')
                      svg.append(f'<text x="{cx:.2f}" y="{base_y2-16}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{c}</text>')
                  else:
                      h = int(round(max_h2 * (c / max_dow))) if max_dow else 6
                      x = cx - bar_w2 / 2
                      y = base_y2 - h
                      svg.append(f'<rect x="{x:.2f}" y="{y:.2f}" width="{bar_w2}" height="{h}" rx="{bar_w2/2}" fill="{dark_green}"/>')
                      svg.append(f'<text x="{cx:.2f}" y="{y-8:.2f}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{c}</text>')
              svg.append(f'<text x="{cx:.2f}" y="{base_y2+32}" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">{esc(dname)}</text>')

          svg.append(f'<text x="{pad_l}" y="{H-12}" font-family="Arial, sans-serif" font-size="12" fill="{text_grey}">Timezone: {esc(TZ_NAME)} · Window: last {SINCE_DAYS} days · Max commits used: {MAX_COMMITS}</text>')
          svg.append("</svg>")

          with open("metrics.plugin.habits.charts.svg", "w", encoding="utf-8") as f:
              f.write("\n".join(svg))
          PY
      ###################################################
      # 6 language graph without PDE_EXAM
      ###################################################


      - name: Languages indepth
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          repositories_skipped: |
            FedericoQuartieri/PDE_Exam          plugin_languages_details: lines, bytes-size
          plugin_languages_ignored: >-
            PostScript, Fortran, Makefile, Shell, TeX, Roff Manpage, Jupyter Notebook, EJS
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 120
          commits_authoring: user
          filename: metrics.plugin.languages.indepth2.svg


      ###################################################
      # 7 Generate C++ breakdown by repo (SVG)
      ###################################################

      - name: Generate C++ breakdown by repo (SVG)
        env:
          GH_TOKEN: ${{ env.METRICS_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python - <<'PY'
          import os
          import requests

          TOKEN = os.environ["GH_TOKEN"]
          USER = "FedericoQuartieri"

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def paged(url, params=None):
              out = []
              page = 1
              while True:
                  p = dict(params or {})
                  p["per_page"] = 100
                  p["page"] = page
                  r = requests.get(url, headers=headers, params=p, timeout=30)
                  r.raise_for_status()
                  data = r.json()
                  if not data:
                      break
                  out.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              return out

          # List your repos (owned)
          repos = paged("https://api.github.com/user/repos", params={"type": "owner", "sort": "updated"})
          repos = [r for r in repos if not r.get("fork", False)]

          rows = []
          for r in repos:
              owner = r["owner"]["login"]
              name = r["name"]
              lr = requests.get(
                  f"https://api.github.com/repos/{owner}/{name}/languages",
                  headers=headers,
                  timeout=30,
              )
              if lr.status_code != 200:
                  continue
              langs = lr.json() or {}
              cxx = int(langs.get("C++", 0))
              total = sum(int(v) for v in langs.values())
              if cxx > 0:
                  rows.append((f"{owner}/{name}", cxx, total))

          rows.sort(key=lambda x: x[1], reverse=True)
          top = rows[:12]
          total_cxx = sum(x[1] for x in rows)

          def fmt_bytes(n):
              if n >= 1024 * 1024:
                  return f"{n/(1024*1024):.2f} MB"
              if n >= 1024:
                  return f"{n/1024:.1f} KB"
              return f"{n} B"

          width = 900
          row_h = 26
          pad = 24
          title_h = 60
          height = title_h + pad + len(top) * row_h + 40

          max_cxx = max([x[1] for x in top], default=1)
          bar_w = 320

          svg = []
          svg.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}">')
          svg.append('<rect width="100%" height="100%" fill="white"/>')
          svg.append(f'<text x="{pad}" y="28" font-family="Arial, sans-serif" font-size="18">C++ contribution by repository</text>')
          svg.append(f'<text x="{pad}" y="48" font-family="Arial, sans-serif" font-size="12" fill="#555">Based on GitHub /languages (bytes). Total C++ across repos: {fmt_bytes(total_cxx)}</text>')

          y0 = title_h
          for i, (repo, cxx, total) in enumerate(top):
              y = y0 + i * row_h
              share = 0.0 if total == 0 else (cxx / total) * 100.0
              bw = int(bar_w * (cxx / max_cxx)) if max_cxx > 0 else 0
              svg.append(f'<text x="{pad}" y="{y+18}" font-family="Arial, sans-serif" font-size="12" fill="#111">{repo}</text>')
              svg.append(f'<rect x="430" y="{y+6}" width="{bw}" height="14" fill="rgb(80,80,80)"/>')
              svg.append(f'<text x="760" y="{y+18}" font-family="Arial, sans-serif" font-size="12" fill="#111">{fmt_bytes(cxx)} ({share:.1f}%)</text>')

          svg.append('</svg>')

          with open("metrics.plugin.languages.byrepo.svg", "w", encoding="utf-8") as f:
              f.write("\n".join(svg))
          PY
  

      ##################################################
      # Copy metrics renders from /metrics_renders (others)
      ##################################################
      - name: Copy renders to repo
        run: |
          for f in /metrics_renders/metrics*.svg; do
            [ -f "$f" ] && cp -f "$f" "./$(basename "$f")"
          done
          git status --porcelain

      ##################################################
      # Commit & push
      ##################################################
      - name: Commit and push SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update metrics SVGs"
          file_pattern: metrics*.svg
          branch: main
