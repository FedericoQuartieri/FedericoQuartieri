name: Generate Individual Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
  WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ##################################################
      # 1. Isometric commit calendar
      ##################################################
      - name: Commit calendar
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: metrics-calendar.svg

      ##################################################
      # 2. Starred topics
      ##################################################
      - name: Starred topics
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          filename: metrics.plugin.topics.svg

      ##################################################
      # 3. WakaTime
      ##################################################
      - name: WakaTime
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ env.WAKATIME_TOKEN }}
          filename: metrics.plugin.wakatime.svg

      ##################################################
      # 4. Languages activity (indepth)
      ##################################################
      - name: Languages indepth
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size
          plugin_languages_ignored: >-
            PostScript, Fortran, Makefile, Shell, TeX, Roff Manpage, Jupyter Notebook, EJS
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 120
          commits_authoring: user
          filename: metrics.plugin.languages.indepth.svg

      ##################################################
      # 5. Habits charts (custom, stable, this works)
      ##################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate habits chart (SVG)
        env:
          GH_TOKEN: ${{ env.METRICS_TOKEN }}
          GH_USER: FedericoQuartieri
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python - <<'PY'
          import os
          import math
          import datetime as dt
          import requests

          TOKEN = os.environ["GH_TOKEN"]
          USER = os.environ["GH_USER"]

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          since_days = 30
          since = (dt.datetime.utcnow() - dt.timedelta(days=since_days)).replace(microsecond=0).isoformat() + "Z"

          def paged(url, params=None):
              out = []
              page = 1
              while True:
                  p = dict(params or {})
                  p["per_page"] = 100
                  p["page"] = page
                  r = requests.get(url, headers=headers, params=p, timeout=30)
                  r.raise_for_status()
                  data = r.json()
                  if not data:
                      break
                  out.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              return out

          repos = paged("https://api.github.com/user/repos", params={"type": "owner", "sort": "pushed"})
          repos = [r for r in repos if not r.get("fork", False)]

          # Keep it sane: only repos pushed recently (last 90 days) and cap to 60 repos
          cutoff = dt.datetime.utcnow() - dt.timedelta(days=90)
          def parse_iso(x):
              try:
                  return dt.datetime.fromisoformat(x.replace("Z", "+00:00")).replace(tzinfo=None)
              except Exception:
                  return None

          filtered = []
          for r in repos:
              pushed = parse_iso(r.get("pushed_at", "") or "")
              if pushed and pushed >= cutoff:
                  filtered.append(r)
          repos = filtered[:60]

          grid = [[0 for _ in range(24)] for __ in range(7)]  # 0=Mon ... 6=Sun

          for r in repos:
              owner = r["owner"]["login"]
              name = r["name"]
              commits = paged(
                  f"https://api.github.com/repos/{owner}/{name}/commits",
                  params={"author": USER, "since": since},
              )
              for c in commits:
                  date_s = (c.get("commit") or {}).get("author", {}).get("date")
                  if not date_s:
                      continue
                  d = dt.datetime.fromisoformat(date_s.replace("Z", "+00:00"))
                  weekday = d.weekday()
                  hour = d.hour
                  if 0 <= weekday <= 6 and 0 <= hour <= 23:
                      grid[weekday][hour] += 1

          maxv = max((max(row) for row in grid), default=0)

          def shade(v):
              if maxv == 0:
                  t = 0.0
              else:
                  t = v / maxv
              # grayscale 240 (light) -> 40 (dark)
              g = int(round(240 - t * 200))
              return f"rgb({g},{g},{g})"

          cell = 16
          pad_l = 80
          pad_t = 40
          w = pad_l + 24 * cell + 20
          h = pad_t + 7 * cell + 40

          days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]

          svg = []
          svg.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="{h}">')
          svg.append('<rect width="100%" height="100%" fill="white"/>')
          svg.append(f'<text x="{pad_l}" y="24" font-family="Arial, sans-serif" font-size="16">Recent coding habits (last {since_days} days)</text>')
          svg.append(f'<text x="{pad_l}" y="38" font-family="Arial, sans-serif" font-size="12" fill="#555">commits by weekday/hour (UTC)</text>')

          for i, dname in enumerate(days):
              y = pad_t + i * cell + 12
              svg.append(f'<text x="10" y="{y}" font-family="Arial, sans-serif" font-size="12" fill="#333">{dname}</text>')

          for hr in range(0, 24, 3):
              x = pad_l + hr * cell + 2
              svg.append(f'<text x="{x}" y="{pad_t + 7*cell + 18}" font-family="Arial, sans-serif" font-size="10" fill="#333">{hr:02d}</text>')

          for d in range(7):
              for hr in range(24):
                  v = grid[d][hr]
                  x = pad_l + hr * cell
                  y = pad_t + d * cell
                  svg.append(f'<rect x="{x}" y="{y}" width="{cell-1}" height="{cell-1}" fill="{shade(v)}"/>')

          total = sum(sum(r) for r in grid)
          svg.append(f'<text x="{pad_l}" y="{h-12}" font-family="Arial, sans-serif" font-size="12" fill="#333">Total commits counted: {total}</text>')
          svg.append('</svg>')

          out = "\n".join(svg)
          with open("metrics.plugin.habits.charts.svg", "w", encoding="utf-8") as f:
              f.write(out)
          PY


      ###################################################
      # 6 language graph without PDE_EXAM
      ###################################################


      - name: Languages indepth
        uses: gh-metrics/metrics@master
        with:
          output_action: none
          token: ${{ env.METRICS_TOKEN }}
          user: FedericoQuartieri
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_skipped: PDE_Exam
          plugin_languages_details: lines, bytes-size
          plugin_languages_ignored: >-
            PostScript, Fortran, Makefile, Shell, TeX, Roff Manpage, Jupyter Notebook, EJS
          plugin_languages_limit: 6
          plugin_languages_analysis_timeout: 120
          commits_authoring: user
          filename: metrics.plugin.languages.indepth2.svg


      ###################################################
      # 7 Generate C++ breakdown by repo (SVG)
      ###################################################

      - name: Generate C++ breakdown by repo (SVG)
        env:
          GH_TOKEN: ${{ env.METRICS_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python - <<'PY'
          import os
          import requests

          TOKEN = os.environ["GH_TOKEN"]
          USER = "FedericoQuartieri"

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def paged(url, params=None):
              out = []
              page = 1
              while True:
                  p = dict(params or {})
                  p["per_page"] = 100
                  p["page"] = page
                  r = requests.get(url, headers=headers, params=p, timeout=30)
                  r.raise_for_status()
                  data = r.json()
                  if not data:
                      break
                  out.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              return out

          # List your repos (owned)
          repos = paged("https://api.github.com/user/repos", params={"type": "owner", "sort": "updated"})
          repos = [r for r in repos if not r.get("fork", False)]

          rows = []
          for r in repos:
              owner = r["owner"]["login"]
              name = r["name"]
              lr = requests.get(
                  f"https://api.github.com/repos/{owner}/{name}/languages",
                  headers=headers,
                  timeout=30,
              )
              if lr.status_code != 200:
                  continue
              langs = lr.json() or {}
              cxx = int(langs.get("C++", 0))
              total = sum(int(v) for v in langs.values())
              if cxx > 0:
                  rows.append((f"{owner}/{name}", cxx, total))

          rows.sort(key=lambda x: x[1], reverse=True)
          top = rows[:12]
          total_cxx = sum(x[1] for x in rows)

          def fmt_bytes(n):
              if n >= 1024 * 1024:
                  return f"{n/(1024*1024):.2f} MB"
              if n >= 1024:
                  return f"{n/1024:.1f} KB"
              return f"{n} B"

          width = 900
          row_h = 26
          pad = 24
          title_h = 60
          height = title_h + pad + len(top) * row_h + 40

          max_cxx = max([x[1] for x in top], default=1)
          bar_w = 320

          svg = []
          svg.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}">')
          svg.append('<rect width="100%" height="100%" fill="white"/>')
          svg.append(f'<text x="{pad}" y="28" font-family="Arial, sans-serif" font-size="18">C++ contribution by repository</text>')
          svg.append(f'<text x="{pad}" y="48" font-family="Arial, sans-serif" font-size="12" fill="#555">Based on GitHub /languages (bytes). Total C++ across repos: {fmt_bytes(total_cxx)}</text>')

          y0 = title_h
          for i, (repo, cxx, total) in enumerate(top):
              y = y0 + i * row_h
              share = 0.0 if total == 0 else (cxx / total) * 100.0
              bw = int(bar_w * (cxx / max_cxx)) if max_cxx > 0 else 0
              svg.append(f'<text x="{pad}" y="{y+18}" font-family="Arial, sans-serif" font-size="12" fill="#111">{repo}</text>')
              svg.append(f'<rect x="430" y="{y+6}" width="{bw}" height="14" fill="rgb(80,80,80)"/>')
              svg.append(f'<text x="760" y="{y+18}" font-family="Arial, sans-serif" font-size="12" fill="#111">{fmt_bytes(cxx)} ({share:.1f}%)</text>')

          svg.append('</svg>')

          with open("metrics.plugin.languages.byrepo.svg", "w", encoding="utf-8") as f:
              f.write("\n".join(svg))
          PY
  

      ##################################################
      # Copy metrics renders from /metrics_renders (others)
      ##################################################
      - name: Copy renders to repo
        run: |
          for f in /metrics_renders/metrics*.svg; do
            [ -f "$f" ] && cp -f "$f" "./$(basename "$f")"
          done
          git status --porcelain

      ##################################################
      # Commit & push
      ##################################################
      - name: Commit and push SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update metrics SVGs"
          file_pattern: metrics*.svg
          branch: main
